name: PR CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        # Capture lint output to a file so we can show it even when the step is allowed to fail
        run: npm run lint 2>&1 | tee /tmp/lint.log
        continue-on-error: true
      - name: Show lint log
        if: always()
        run: cat /tmp/lint.log || true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

